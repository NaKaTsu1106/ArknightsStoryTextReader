# Builds the ASTR webpage and deploys it to GitHub Pages.
# Served at https://nakatsu1106.github.io/ArknightsStoryTextReader/

name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress and latest queued run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE: /ArknightsStoryTextReader/
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'   # required for the astr-i18n submodule
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
      - run: |
          cd reader
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reader/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
